# Sports blocklist -- markets matching any phrase are excluded before parsers run
# Generated by scripts/audit_phase1_5.py
#
# Applied via word-boundary regex at scanner level.
# Format: case-insensitive substring (scanner wraps in \b...\b for whole words,
# or exact prefix for 'nhl:' style patterns).
blocked_phrases:
  # League prefix patterns (cover all game lines for that league)
  - "nhl:"
  - "nba:"
  - "nfl:"
  - "wnba:"
  - "mlb:"
  - "mls:"
  # Footballer/player names that trigger weather keywords
  - "jonas wind"
  - "bundesliga"
  # Specific team names that trigger weather keywords
  - "tampa bay lightning"
  - "carolina hurricanes"
  - "seattle storm"
  - "okc thunder"
  - "oklahoma city thunder"
  - "miami heat"
  - "golden state warriors"
  - "phoenix suns"
  - "denver nuggets"
  - "portland trail blazers"
  # Finance markets (not crypto -- crypto is now actively traded)
  - "token price"
  - "stock price"
  # Championship events
  - "stanley cup"
  - "super bowl"
  - "world series"
  - "nba finals"
  - "nfl playoffs"
  - "nhl playoffs"
  - "champions league"
  - "premier league"
  - "la liga"
  - "serie a"
  # Political markets with weather words
  - "presidential"
  - "election"
  - "congress"
  - "senate"