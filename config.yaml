# -- Trading parameters ----------------------------------------------
trading:
  paper_mode: true           # Set false only when ready for real money
  ev_threshold: 0.08          # 8% minimum edge (was 5%) -- only very strong signals
  kelly_fraction: 0.15       # 15% Kelly (was 25%) -- smaller positions = less risk
  max_position_usdc: 25      # $25 cap per trade (was $50) -- halved max exposure
  max_open_positions: 3      # Max 3 positions (was 5) -- less capital at risk
  daily_loss_limit_usdc: 75  # $75/day limit (was $200) -- tight daily stop
  min_confidence: 0.65       # 65% minimum (was 50%) -- only high-confidence trades
  min_edge_score: 0.04       # Doubled (was 0.02) -- stricter quality filter
  poll_interval_seconds: 900 # How often the bot scans markets (15 min)
  loss_streak_pause: 3       # Pause after 3 consecutive losses
  edge_confirmations: 2      # Require 2 consecutive scans before trading

# -- Market filters ----------------------------------------------------
markets:
  min_liquidity_usdc: 10000          # [up] $10K minimum (was $5K) -- only liquid markets
  backtest_min_liquidity_usdc: 500   # Lower bar for backtesting (more historical data)
  max_hours_to_expiry: 168   # Only trade markets expiring within 7 days
  min_hours_to_expiry: 2     # Avoid markets expiring too soon (latency risk)
  weather_keywords:
    - rain
    - rainfall
    - precipitation
    - snow
    - snowfall
    - temperature
    - degrees
    - fahrenheit
    - celsius
    - storm
    - hurricane
    - tornado
    - wind
    - blizzard
    - freeze
    - frost
    - flood
    - drought
    - heatwave
    - heat wave
    - highest temperature
    - daily high
    - daily max
    - weather
    - thunderstorm
    - ice storm
    - cold front
    - warm front
    - heat index
    - wind chill
    - dewpoint
    - humidity

# -- Weather ensemble weights (must sum to 1.0) ------------------------
weather:
  cache_ttl_seconds: 3600    # Re-use cached forecast for 1 hour
  sources:
    tomorrow_io:
      weight: 0.30
      enabled: true
    open_meteo:
      weight: 0.20
      enabled: true
    nws:
      weight: 0.15
      enabled: true          # US locations only; auto-disabled for non-US
    weatherapi:
      weight: 0.15
      enabled: true          # Needs WEATHERAPI_KEY in .env (free 1M/month)
    pirate_weather:
      weight: 0.10
      enabled: true          # Needs PIRATE_WEATHER_KEY in .env (free 10K/month)
    met_norway:
      weight: 0.10
      enabled: true          # Free, no key needed -- ECMWF model

