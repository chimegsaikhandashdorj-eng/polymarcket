# -- Risk management ---------------------------------------------------
risk:
  max_kelly_fraction: 0.15        # [dn] 15% Kelly ceiling (was 25%) -- conservative sizing
  correlation_block: true         # Block duplicate trades on same city+date+metric
  stale_forecast_hours: 2         # [dn] 2h freshness (was 3h) -- reject stale data faster
  max_city_exposure_pct: 0.20     # [dn] 20% per city (was 30%) -- more diversified
  max_portfolio_exposure_pct: 0.40 # [dn] 40% total (was 60%) -- always keep 60% cash
  drawdown_halt_pct: 0.20         # [dn] 20% drawdown halt (was 40%) -- stop earlier

# -- Multi-timeframe loss limits ----------------------------------------
loss_limits:
  daily_usdc: 75                  # [dn] $75/day (was $200) -- tight daily cap
  weekly_usdc: 200                # [dn] $200/week (was $500) -- weekly protection
  monthly_usdc: 400               # [dn] $400/month (was $1000) -- hard monthly stop

# -- Adversarial market detection ---------------------------------------
adversarial:
  enabled: true
  price_jump_threshold: 0.10      # Flag if price moves >10pp between consecutive scans
  volume_spike_multiplier: 5.0    # Flag if volume delta > 5x rolling average delta
  spread_collapse_high: 0.05      # Spread was wider than this...
  spread_collapse_low: 0.01       # ...and collapsed below this in 1 scan
  cooldown_minutes: 30            # Block new entries for this many minutes after flag

# -- Opportunity cost (time value of capital locked in positions) --------
opportunity_cost:
  enabled: true                   # [up] ENABLED -- penalizes long lock-up trades
  apy: 0.08                       # [up] 8% APY baseline -- makes bot pickier about time

# -- Crypto trading settings --------------------------------------------
crypto:
  enabled: true
  paper_only_until: "2026-06-05"   # Force paper mode until this date (14 day test)
  assets:                          # Which coins to trade
    - bitcoin
    - ethereum
    - solana
  max_position_usdc: 5             # $5 max per crypto trade (very cautious)
  daily_loss_limit_usdc: 15        # $15/day crypto loss limit
  min_ev_threshold: 0.12           # 12% minimum edge for crypto (higher than weather)
  min_confidence: 0.75             # 75% confidence minimum
  edge_confirmations: 3            # Require 3 scans (stricter than weather's 2)
  min_threshold_usd: 100           # Don't trade markets with threshold < $100
  max_volatility_daily: 0.12       # Skip if daily vol > 12% (too unpredictable)
  min_hours_to_expiry: 12          # Don't trade crypto markets expiring < 12h
  momentum_weight: 0.3             # How much to trust trend vs. pure stats
  max_spread: 0.04                 # 4% max spread for crypto (tighter than weather)
  ccxt_exchanges:                  # CCXT exchanges for price data (order = priority)
    - binance
    - kraken
    - okx
  macro_signals: true              # Enable OpenBB/Yahoo macro signals (DXY, VIX)

# -- Square-root market impact slippage model ---------------------------
slippage:
  base: 0.005                     # Base slippage 0.5%
  max_impact: 0.02                # Skip trade if sqrt impact would exceed 2%

# -- Telegram bot scheduler --------------------------------------------
telegram:
  scheduler:
    morning_hour: 9                # UTC hour for morning report (bankroll, positions)
    evening_hour: 21               # UTC hour for evening summary (PnL, performance)
    alert_check_minutes: 15        # How often to check price alerts (minutes)
    weekly_summary_dow: 0          # Day of week for weekly summary (0=Monday, 6=Sunday)
